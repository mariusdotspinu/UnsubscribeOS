name: Build installers

# Builds native installers for Windows, macOS and Linux. Triggered on a version tag
# (e.g. `git tag v1.0.0 && git push --tags`) and attaches the installers to a GitHub Release.
# Can also be run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: packaging/package-windows.bat
            artifact: "dist/*.msi"
          - os: macos-latest        # Apple Silicon runner
            platform: mac
            script: bash packaging/package-macos.sh
            artifact: "dist/*.dmg"
          - os: ubuntu-latest
            platform: linux
            script: bash packaging/package-linux.sh
            artifact: "dist/*.deb"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # jpackage needs WiX Toolset v3 to build Windows .msi/.exe installers.
      - name: Install WiX (Windows only)
        if: matrix.os == 'windows-latest'
        run: choco install wixtoolset --no-progress -y

      - name: Build installer
        run: ${{ matrix.script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsubscribeos-${{ matrix.platform }}
          path: ${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
