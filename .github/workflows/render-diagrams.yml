name: Render diagrams

# Renders the PlantUML sources in docs/ to committed PNGs whenever a .puml changes, so the README
# can embed plain images (which GitHub always renders) instead of relying on an external PlantUML
# server. Can also be run manually from the Actions tab.
on:
  push:
    branches: [master]
    paths:
      - "docs/**.puml"
      - ".github/workflows/render-diagrams.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pulls in PlantUML, a JRE and Graphviz (needed for the component diagram).
      - name: Install PlantUML
        run: sudo apt-get update && sudo apt-get install -y plantuml graphviz

      - name: Render .puml → .png
        run: plantuml -tpng docs/*.puml

      # Only commits when a rendered PNG actually changed. Commits via GITHUB_TOKEN don't
      # re-trigger workflows, and docs/*.png isn't in this workflow's path filter anyway, so
      # there's no risk of a render loop.
      - name: Commit rendered diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: re-render PlantUML diagrams"
          file_pattern: "docs/*.png"
